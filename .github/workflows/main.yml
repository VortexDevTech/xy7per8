name: Donghua Auto Uploader

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 170

    env:
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_MAIN_CHANNEL_ID: ${{ secrets.TELEGRAM_MAIN_CHANNEL_ID }}
      TELEGRAM_FORWARDED_CHANNEL_ID: ${{ secrets.TELEGRAM_FORWARDED_CHANNEL_ID }}

    steps:
      # ----------------------------------------------------------------
      # 1. CHECK DISK & FREE SPACE IF NEEDED
      # ----------------------------------------------------------------
      - name: 📏 Check available disk space
        id: disk_check
        run: |
          FREE_GB=$(df / --output=avail -BG | tail -1 | tr -d ' G')
          echo "Free space: ${FREE_GB}GB"
          echo "free_gb=${FREE_GB}" >> "$GITHUB_OUTPUT"

          if [ "$FREE_GB" -gt 50 ]; then
            echo "skip_cleanup=true" >> "$GITHUB_OUTPUT"
            echo "✅ Enough space (${FREE_GB}GB > 50GB) — skipping cleanup"
          else
            echo "skip_cleanup=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Low space (${FREE_GB}GB <= 50GB) — will run cleanup"
          fi

      - name: 🗑️ Free disk space
        if: steps.disk_check.outputs.skip_cleanup == 'false'
        run: |
          echo "=== BEFORE CLEANUP ==="
          df -h /

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/Java*
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/julia*

          sudo docker image prune --all --force 2>/dev/null || true

          sudo swapoff -a
          sudo rm -f /swapfile

          sudo apt-get remove -y \
            '^aspnetcore-.*' \
            '^dotnet-.*' \
            'php.*' \
            azure-cli \
            google-cloud-cli \
            google-chrome-stable \
            firefox \
            powershell \
            mono-devel \
            libgl1-mesa-dri \
            2>/dev/null || true

          sudo apt-get autoremove -y
          sudo apt-get clean

          echo ""
          echo "=== AFTER CLEANUP ==="
          df -h /

      # ----------------------------------------------------------------
      # 2. CHECKOUT REPO
      # ----------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 3. SETUP PYTHON
      # ----------------------------------------------------------------
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # 4. INSTALL SYSTEM DEPENDENCIES
      # ----------------------------------------------------------------
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
          ffprobe -version | head -1

      # ----------------------------------------------------------------
      # 5. INSTALL PYTHON DEPENDENCIES
      # ----------------------------------------------------------------
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            yt-dlp \
            httpx \
            beautifulsoup4 \
            Kurigram \
            curl_cffi \
            tgcrypto \
            tqdm
          python -c "import yt_dlp, httpx, bs4, pyrogram; print('✅ All imports OK')"

      # ----------------------------------------------------------------
      # 6. INITIALIZE DB IF MISSING
      # ----------------------------------------------------------------
      - name: 📄 Initialize db.json if missing
        run: |
          if [ ! -f db.json ]; then
            echo "[]" > db.json
            echo "Created fresh db.json"
          else
            echo "db.json exists ($(wc -c < db.json) bytes)"
          fi

      # ----------------------------------------------------------------
      # 7. CREATE WORKING DIRECTORIES
      # ----------------------------------------------------------------
      - name: 📁 Create directories
        run: |
          mkdir -p temp downloads
          echo "✅ Directories ready"
          df -h /

      # ----------------------------------------------------------------
      # 8. RUN MAIN SCRIPT
      # ----------------------------------------------------------------
      - name: 🚀 Run main.py
        run: |
          python main.py

      # ----------------------------------------------------------------
      # 9. CLEANUP DOWNLOADS
      # ----------------------------------------------------------------
      - name: 🧹 Cleanup downloads
        if: always()
        run: |
          rm -rf temp downloads
          echo "✅ Cleaned up temp files"

      # ----------------------------------------------------------------
      # 10. COMMIT & PUSH DB
      # ----------------------------------------------------------------
      - name: 💾 Commit db.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add db.json

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to db.json"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            ENTRIES=$(python -c "import json; print(len(json.load(open('db.json'))))" 2>/dev/null || echo "?")
            git commit -m "📦 Update db.json — ${ENTRIES} entries [${TIMESTAMP}]"
            git push
            echo "✅ db.json pushed"
          fi
